<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring AI Chat</title>

<style>
    :root {
        --bg: #f3f5f7;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --assistant-bg: #ffffff;
        --user-bg: #2563eb;
        --user-text: #ffffff;
        --accent: #111827;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background:
            radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 45%),
            radial-gradient(circle at 90% 90%, #fef3c7 0%, transparent 45%),
            var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .app {
        width: min(920px, 100%);
        height: min(92vh, 900px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(17, 24, 39, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .topbar {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: #ffffffd9;
        backdrop-filter: blur(8px);
    }

    .title {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
    }

    .subtitle {
        font-size: 12px;
        color: var(--muted);
    }

    .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
    }

    .row.user { justify-content: flex-end; }

    .avatar {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        display: grid;
        place-items: center;
        flex-shrink: 0;
    }

    .avatar.assistant {
        background: #111827;
        color: #fff;
    }

    .avatar.user {
        background: #bfdbfe;
        color: #1e3a8a;
        order: 2;
    }

    .message-group {
        max-width: min(780px, 82vw);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .row.user .message-group { align-items: flex-end; }

    .message {
        width: fit-content;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 11px 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        background: var(--assistant-bg);
    }

    .row.user .message {
        background: var(--user-bg);
        border-color: var(--user-bg);
        color: var(--user-text);
    }

    .composer-wrap {
        padding: 14px;
        border-top: 1px solid var(--border);
        background: #fff;
    }

    .composer {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        box-shadow: 0 4px 20px rgba(17, 24, 39, 0.05);
    }

    textarea {
        flex: 1;
        border: none;
        outline: none;
        resize: none;
        font-size: 14px;
        line-height: 1.5;
        min-height: 24px;
        max-height: 170px;
        font-family: inherit;
        color: var(--text);
    }

    .send-btn {
        border: none;
        border-radius: 10px;
        background: #111827;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        transition: transform .12s ease, opacity .12s ease;
    }

    .send-btn:hover { transform: translateY(-1px); }

    .send-btn:disabled {
        opacity: .5;
        cursor: not-allowed;
        transform: none;
    }

    .dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
    }

    .dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #94a3b8;
        animation: blink 1s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes blink {
        0%, 80%, 100% { opacity: .25; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-2px); }
    }

    @media (max-width: 700px) {
        body { padding: 0; }
        .app {
            width: 100%;
            height: 100vh;
            border-radius: 0;
            border: none;
        }
        .chat-body { padding: 16px 12px; }
        .composer-wrap { padding: 10px; }
    }
</style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="title">Spring AI Chat</div>
        <div class="subtitle">질문하면 자연스럽게 답변해드릴게요.</div>
    </header>

    <main id="chatBody" class="chat-body"></main>

    <footer class="composer-wrap">
        <div class="composer">
            <textarea id="messageInput" placeholder="메시지를 입력하세요. (Shift+Enter 줄바꿈)" rows="1"></textarea>
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </footer>
</div>

<script>
const chatBody = document.getElementById('chatBody');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
let isLoading = false;

function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 170) + 'px';
}

input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    chatBody.scrollTop = chatBody.scrollHeight;
}

function createRow(role) {
    const row = document.createElement('div');
    row.className = `row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'assistant' ? 'AI' : 'ME';

    const group = document.createElement('div');
    group.className = 'message-group';

    if (role === 'user') {
        row.appendChild(group);
        row.appendChild(avatar);
    } else {
        row.appendChild(avatar);
        row.appendChild(group);
    }

    chatBody.appendChild(row);
    return group;
}

function addTextMessage(text, role) {
    const group = createRow(role);
    const div = document.createElement('div');
    div.className = 'message';
    div.textContent = text;
    group.appendChild(div);
    scrollToBottom();
}

function addThinkingMessage() {
    const group = createRow('assistant');
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = '생각 중 <span class="dots"><span></span><span></span><span></span></span>';
    group.appendChild(div);
    scrollToBottom();
    return group.parentElement;
}

function setLoading(loading) {
    isLoading = loading;
    sendBtn.disabled = loading;
    input.disabled = loading;
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message || isLoading) return;

    addTextMessage(message, 'user');
    input.value = '';
    autoResize();
    setLoading(true);

    const thinkingRow = addThinkingMessage();

    try {
        const res = await fetch('/ai/ask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ prompt: message })
        });

        const data = await res.json();
        thinkingRow.remove();

        if (!data.success) {
            addTextMessage(data.error || 'AI 처리 중 오류가 발생했습니다.', 'assistant');
            return;
        }

        const answer = data.answer || (Array.isArray(data.parts) && data.parts[0] && data.parts[0].content);
        addTextMessage(answer || '응답을 받지 못했습니다.', 'assistant');
    } catch (e) {
        if (thinkingRow && thinkingRow.parentNode) {
            thinkingRow.remove();
        }
        addTextMessage('서버 통신 중 오류가 발생했습니다.', 'assistant');
    } finally {
        setLoading(false);
        input.focus();
    }
}

addTextMessage('안녕하세요. 무엇을 도와드릴까요?', 'assistant');
autoResize();
</script>
</body>
</html>
